# Coturn TURN/STUN server for WebRTC NAT traversal (mobile reporters)
# Used by Reporter Portal publishers and optionally by OvenMediaEngine

listening-port=3478
tls-listening-port=5349

# Listen on all interfaces (Docker)
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# External IP: pass via Docker command (see docker-compose)
# e.g. --external-ip=YOUR_PUBLIC_IP/0.0.0.0

# Relay port range for TURN (UDP). Expose this range in docker-compose.
# 100 ports supports many concurrent TURN allocations (20+ reporters)
min-port=49152
max-port=49251

# Realm for TURN authentication
realm=newsroom.local

# Long-term credential mechanism (username/password) for reporter clients
lt-cred-mech

# Static user for reporters (username=reporter, password from TURN_STATIC_AUTH_SECRET or default)
# Generate with: turnadmin -a -u reporter -r newsroom.local -p YOUR_PASSWORD
# Or use static auth secret: run with -e TURN_STATIC_AUTH_SECRET=your_secret and use TURN REST API or predefined user
user=reporter:reporter123

# Security
fingerprint
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# Logging (reduce in production if needed)
log-file=stdout
verbose

# Deny loopback and link-local
denied-peer-ip=127.0.0.1-127.255.255.255
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=::1
denied-peer-ip=64:ff9b::-64:ff9b::1:255:255:255
denied-peer-ip=::ffff:0.0.0.0-::ffff:255.255.255.255

# Allow same network (Docker)
allowed-peer-ip=10.0.0.0-10.255.255.255
allowed-peer-ip=172.16.0.0-172.31.255.255
allowed-peer-ip=192.168.0.0-192.168.255.255
