worker_processes auto;
rtmp_auto_push on;
events {
    worker_connections 1024;
}
rtmp {
    server {
        listen 1935;
        listen [::]:1935;
        chunk_size 4096;
        # Application "live": receives push from OME, vMix/OBS pull from here
        application live {
            live on;
            allow publish 127.0.0.1;
            allow publish 10.0.0.0/8;
            allow publish 172.16.0.0/12;
            allow publish 192.168.0.0/16;
            allow publish all;  # OME container pushes from Docker network
            allow play all;
        }
    }
}
http {
    server {
        listen 80;
        server_name localhost;
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        location /stat.xsl {
            root /usr/local/nginx/html;
        }
    }
}
