# Full Nginx config for www.newznow.org (Reporter Portal + Dashboard + API + OME WebSocket)
# Copy this file to your server and enable it, e.g.:
#   sudo cp deploy/nginx-newsroom.conf /etc/nginx/sites-available/newsroom
#   sudo ln -sf /etc/nginx/sites-available/newsroom /etc/nginx/sites-enabled/
#   # Edit paths and cert paths below if needed, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Optional: In your main nginx.conf, inside the http { } block, add this once for robust WebSocket:
#   map $http_upgrade $connection_upgrade { default upgrade; '' close; }
# Then in the location /ome-ws/ below, use: proxy_set_header Connection $connection_upgrade;

# HTTP: redirect to HTTPS www (and allow Certbot)
server {
    listen 80;
    server_name www.newznow.org newznow.org;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://www.newznow.org$request_uri;
    }
}

# HTTPS: root domain -> redirect to www
server {
    listen 443 ssl;
    server_name newznow.org;

    ssl_certificate /etc/letsencrypt/live/www.newznow.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.newznow.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.newznow.org$request_uri;
}

# HTTPS – Reporter portal + Dashboard + API + OME WebSocket (www)
server {
    listen 443 ssl;
    server_name www.newznow.org;

    ssl_certificate /etc/letsencrypt/live/www.newznow.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.newznow.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/newsroom/newsroom/frontend/dist;
    index index.html;

    # OME WebSocket – MUST come before location / so it is matched first
    location /ome-ws/ {
        proxy_pass http://127.0.0.1:3333/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Use backend host so OME accepts the request (try $host if this fails)
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dashboard/ {
        alias /opt/newsroom/newsroom/dashboard/dist/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    location / {
        try_files $uri /index.html;
    }
}
